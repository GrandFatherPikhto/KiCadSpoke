target_ref: IC1
side: back

thermal_via_array:
  enabled: true
  target_ref: IC1
  pad: '145'
  net: GND
  rows: 4
  cols: 4
  margin_mm: 0.5
  pattern: grid
  drill_mm: 0.3
  diameter_mm: 0.5

# Один шаблон на всё -- вся геометрия локальная (along/across), при
# rotation_deg=0 это выглядело бы как "эталонный" правый борт.
templates:
  cap_pair_standard:
    power_via:
      offset_along_mm: 0.0
      offset_across_mm: -1.5
      drill_mm: 0.3
      diameter_mm: 0.6
    component1:                      # "тонкий" (100nF)
      offset_along_mm: 1.0
      offset_across_mm: -1.0
      angle_deg: 90.0
      gnd_via_offset_along_mm: 0.0
      gnd_via_offset_across_mm: -1.0
      gnd_via_net: GND
    component2:                      # "толстый" (4.7uF)
      offset_along_mm: 1.0
      offset_across_mm: 2.0
      angle_deg: 270.0
      gnd_via_offset_along_mm: 0.0
      gnd_via_offset_across_mm: 1.3
      gnd_via_net: GND

rules:
- net: +1V2_VCCINT
  spokes:
  # Пад 109 -- в вашем примере rotation_deg такой, что "положительный y"
  # (across) уводил C39 внутрь дворика
  - pad: '109'
    template: cap_pair_standard
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 90.0
    component1: C39
    component2: C54
  # Пад 62 -- тот самый борт, где раньше знак приходилось переворачивать
  # руками. Теперь -- просто другой rotation_deg, шаблон не меняется.
  - pad: '62'
    template: cap_pair_standard
    shift_x_mm: 0.4
    shift_y_mm: 0.0
    rotation_deg: 270.0
    component1: C10
    component2: C35

target_ref: IC1
side: back

thermal_via_array:
  enabled: true
  target_ref: IC1
  pad: '145'
  net: GND
  rows: 4
  cols: 4
  margin_mm: 0.5
  pattern: grid
  drill_mm: 0.3
  diameter_mm: 0.5

# Один шаблон на всё -- вся геометрия локальная (along/across), при
# rotation_deg=0 это выглядело бы как "эталонный" правый борт.
#
# KiCadSpoke: components -- список произвольной длины, каждый элемент --
# РОЛЬ ("LIGHT"/"HEAVY"), не ref. Конкретный компонент подбирается
# автоматически из пула: все футпринты, чей реальный пад сидит на цепи
# правила (rule.net ниже) и у кого пользовательское поле Role (в
# Eeschema) совпадает с этой ролью. Разбираются по очереди, в
# естественном численном порядке (C5 раньше C10).
#
# Обобщённые via: vias -- список произвольной длины НА ОБОИХ уровнях
# (спица и компонент). Координаты ВСЕГДА от нуля спицы (along/across),
# даже для via внутри components -- не от пада самого компонента. net:
# не указан (или null) -- берётся цепь правила (rule.net).
templates:
  cap_pair_standard:
    vias:                             # была единственная power_via
      - offset_along_mm: 0.0
        offset_across_mm: -1.5
        drill_mm: 0.3
        diameter_mm: 0.6
        # net не указан -> +1V2_VCCINT (rule.net)
    components:
      - role: LIGHT                    # "тонкий" (100nF)
        offset_along_mm: 1.0
        offset_across_mm: -1.0
        angle_deg: 90.0
        vias:                          # была единственная gnd_via_*
          - offset_along_mm: 0.0
            offset_across_mm: -1.0
            net: GND
            drill_mm: 0.3
            diameter_mm: 0.6
      - role: HEAVY                    # "толстый" (4.7uF)
        offset_along_mm: 1.0
        offset_across_mm: 2.0
        angle_deg: 270.0
        vias:
          - offset_along_mm: 0.0
            offset_across_mm: 1.3
            net: GND
            drill_mm: 0.3
            diameter_mm: 0.6

rules:
- net: +1V2_VCCINT
  spokes:
  # Пад 109 -- поставьте в Eeschema поле Role=LIGHT/HEAVY на нужных
  # конденсаторах +1V2_VCCINT, дальше pool сам разберёт, кому какой борт.
  - pad: '109'
    template: cap_pair_standard
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 90.0
  # Пад 62 -- тот самый борт, где раньше знак приходилось переворачивать
  # руками. Теперь -- просто другой rotation_deg, шаблон не меняется, и
  # никакого ref подбирать вручную не нужно -- пул сделает это сам.
  - pad: '62'
    template: cap_pair_standard
    shift_x_mm: 0.4
    shift_y_mm: 0.0
    rotation_deg: 270.0

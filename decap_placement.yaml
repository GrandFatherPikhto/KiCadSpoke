# decap_placement.yaml — конфиг для KiCadDecapPlacer
#
# Пример подогнан под тестовую плату GrandFatherPikhto/KiCadIPCTests/
# test_boards/10CL006 — IC1 = 10CL006YE144C8G, TQFP144 (не BGA!),
# 144 периметрийных вывода + термопад "145" (EP_(GND)_145, 6.85x6.85мм).

target_ref: "IC1"             # refdes микросхемы (FPGA), вокруг которой расставляем

# Зона-ограничитель (Rule Area) — используется и как граница
# "изнутри/снаружи", и как опорная линия для placement: boundary.
# На актуальной плате (test_boards/10CL006YE144C8G) она уже нарисована
# вручную вокруг IC1 — прямоугольник (с одной доп. точкой на верхней грани),
# is_rule_area=True, слои F.Cu+B.Cu.
boundary_zone: "RA_DECAP_ZONE"

side: "back"                  # сторона размещения конденсаторов: front | back
rotation_mode: "radial"       # radial (вдоль луча центр->площадка) |
                              # orthogonal (то же, но округлено до ближайших
                              # 90° — параллельно/перпендикулярно сторонам
                              # прямоугольной зоны, а не "лучами") | fixed
fixed_angle_deg: 0.0

# --- Настройки stitching-виа (глобальные по умолчанию, можно переопределить в assignment) ---
via:
  enabled: true
  net: "GND"                  # на какую цепь сажаем виа
  drill_mm: 0.3
  diameter_mm: 0.6
  offset_from_cap_mm: 1.0     # смещение виа от точки конденсатора (было 0.6 — маловато,
                              # виа попадали на соседние площадки IC1)
  direction: "away_from_pad"  # away_from_pad | toward_pad | perpendicular
  count: 1                    # 1 | 2 (пара по бокам) — при 2 offset считается для каждой в свою сторону перпендикулярно направлению direction

# --- Массив термопереходов под термопадом (EP) ---
# Независимая от rules/boundary_zone секция: можно использовать конфиг
# только с ней, без расстановки конденсаторов вовсе. Актуально для
# TQFP/QFN с открытым металлическим дном на GND (как площадка "145"
# EP_(GND)_145 у IC1 10CL006YE144C8G — TQFP144, а не BGA: у него нет ничего
# "под корпусом", кроме этого одного центрального термопада 6.85x6.85мм).
thermal_via_array:
  enabled: true
  target_ref: "IC1"     # по умолчанию берётся общий target_ref сверху,
                         # но можно указать отдельно, если термопад не у
                         # того же компонента, что и rules
  pad: "145"             # номер площадки термопада
  net: "GND"
  rows: 4
  cols: 4
  margin_mm: 0.5         # отступ от края площадки до ближайшего ряда виа
  pattern: "grid"        # grid | staggered (шахматное смещение чётных/нечётных строк)
  drill_mm: 0.3
  diameter_mm: 0.5


# --- rules сгенерированы generate_rules.py (обновлено 2026-07-12) ---
# Изменения этой версии:
# 1. Исправлен угол при отражении на B.Cu (kicad_decap_placer.py):
#    для зеркального футпринта нужный угол — 180°-φ, а не φ (подтверждено
#    эмпирически тестом флипа: 0° -> 180°). Раньше давало "ёжик" — у
#    каждого конденсатора угол был неверным на свою величину.
# 2. Исправлен знак направления stitching-виа (kicad_decap_placer.py):
#    via.direction: away_from_pad раньше считался в одну сторону для
#    inside и outside, хотя inside-конденсатор физически МЕЖДУ центром и
#    выводом (там "от вывода" = к центру), а outside — ЗА выводом (там
#    "от вывода" = ещё дальше наружу). Из-за этого виа у inside-
#    конденсаторов уезжали прямо на площадки IC1.
# 3. Увеличены отступы: 100nF (inside) 0.5->1.0мм, 4.7uF (outside)
#    1.5->2.2мм, offset_from_cap_mm виа 0.6->1.0мм (см. via: выше).
# 4. Добавлен фан-аут: если round-robin присвоил ДВУМ конденсаторам один
#    и тот же вывод (сейчас только C19+C27 -> pad 5 на VCCINT, т.к.
#    конденсаторов больше, чем выводов), второй получает увеличенный
#    offset_mm (+0.9мм за каждый повторный заход), чтобы не сесть в одну
#    точку с первым.
# 5. Добавлен (но пока не сработал — реальный минимум между выводами
#    2.5мм) фильтр минимального расстояния между выводами перед
#    round-robin — механизм на случай более плотных цепей в будущем.

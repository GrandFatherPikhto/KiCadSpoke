# decap_placement.yaml — конфиг для KiCadDecapPlacer
#
# Пример подогнан под тестовую плату GrandFatherPikhto/KiCadIPCTests/
# test_boards/10CL006 — IC1 = 10CL006YE144C8G, TQFP144 (не BGA!),
# 144 периметрийных вывода + термопад "145" (EP_(GND)_145, 6.85x6.85мм).

target_ref: "IC1"             # refdes микросхемы (FPGA), вокруг которой расставляем

# Зона-ограничитель (Rule Area) — используется и как граница
# "изнутри/снаружи", и как опорная линия для placement: boundary.
# ВАЖНО: на этой тестовой плате такой зоны пока нет — её нужно один раз
# нарисовать руками в PCB-редакторе вокруг IC1 (см. предыдущее обсуждение:
# проще нарисовать простой прямоугольник вокруг курьярда, чем парсить
# сложную геометрию F.CrtYd через API). Пока зоны нет — секция rules ниже
# не сработает, а thermal_via_array сработает независимо от неё.
boundary_zone: "RA_DECAP_ZONE"

side: "back"                  # сторона размещения конденсаторов: front | back
rotation_mode: "radial"       # radial (вдоль луча центр->площадка) | fixed
fixed_angle_deg: 0.0

# --- Настройки stitching-виа (глобальные по умолчанию, можно переопределить в assignment) ---
via:
  enabled: true
  net: "GND"                  # на какую цепь сажаем виа
  drill_mm: 0.3
  diameter_mm: 0.6
  offset_from_cap_mm: 0.6     # смещение виа от точки конденсатора
  direction: "away_from_pad"  # away_from_pad | toward_pad | perpendicular
  count: 1                    # 1 | 2 (пара по бокам) — при 2 offset считается для каждой в свою сторону перпендикулярно направлению direction

# --- Массив термопереходов под термопадом (EP) ---
# Независимая от rules/boundary_zone секция: можно использовать конфиг
# только с ней, без расстановки конденсаторов вовсе. Актуально для
# TQFP/QFN с открытым металлическим дном на GND (как площадка "145"
# EP_(GND)_145 у IC1 10CL006YE144C8G — TQFP144, а не BGA: у него нет ничего
# "под корпусом", кроме этого одного центрального термопада 6.85x6.85мм).
thermal_via_array:
  enabled: true
  target_ref: "IC1"     # по умолчанию берётся общий target_ref сверху,
                         # но можно указать отдельно, если термопад не у
                         # того же компонента, что и rules
  pad: "145"             # номер площадки термопада
  net: "GND"
  rows: 4
  cols: 4
  margin_mm: 0.5         # отступ от края площадки до ближайшего ряда виа
  pattern: "grid"        # grid | staggered (шахматное смещение чётных/нечётных строк)
  drill_mm: 0.3
  diameter_mm: 0.5

rules:
  # ВНИМАНИЕ: refdes конденсаторов, номера площадок IC1 и точная привязка
  # net<->pad ниже — ПРИМЕР для иллюстрации формата. Перед реальным
  # прогоном на 10CL006 сверьте реальные номера площадок с точным
  # netlist/схемой (например, через netclass_audit.py или
  # kicad_simplifyer.py из соседнего проекта) — площадки TQFP144
  # нумеруются простыми числами 1-144 (плюс 145 у термопада), а не
  # буквенно-цифровыми BGA-координатами.
  - net: "+3V3_VCCIO"
    assignments:
      # "boundary": ставим прямо на линию зоны — компромисс между близостью
      # к площадке и удобством дальнейшей трассировки снаружи.
      - ref: "C101"
        pad: "22"
        placement: "boundary"
        offset_mm: 0.0
        via: true

      # "outside": классика для периметрийного корпуса — за пределами
      # зоны с отступом наружу. Для TQFP это основной режим (см.
      # примечание в конце файла про inside/BGA).
      - ref: "C102"
        pad: "23"
        placement: "outside"
        offset_mm: 1.2
        via: false            # у этого конденсатора виа не нужна (например,
                               # рядом уже есть стежка от соседнего C101)

  - net: "+1V2_VCCINT"
    assignments:
      - ref: "C201"
        pad: "3"
        placement: "outside"
        offset_mm: 1.0
        via:
          enabled: true        # per-assignment можно переопределить не только
          count: 2              # включение, но и любой параметр из via: выше
          diameter_mm: 0.5

      - ref: "C202"
        pad: "107"
        placement: "boundary"
        offset_mm: 0.0
        via: true

# Примечания:
# - placement трактуется относительно границы boundary_zone вдоль луча
#   "центр компонента (U1) -> площадка":
#     outside  = точка пересечения луча с границей + offset_mm НАРУЖУ
#     inside   = точка на площадке минус offset_mm В СТОРОНУ ГРАНИЦЫ
#                (т.е. между площадкой и границей, ближе к площадке)
#     boundary = точка пересечения луча с границей, offset_mm — небольшая
#                правка вдоль того же луча (можно оставить 0.0)
# - via: true эквивалентно via: {enabled: true} — берутся остальные
#   параметры из глобального блока via: наверху.
# - via: false отключает виа для конкретного конденсатора независимо от
#   глобальной настройки.
# - via.count: 2 — пара виа симметрична ОТНОСИТЕЛЬНО САМОГО КОНДЕНСАТОРА,
#   разнесена перпендикулярно лучу центр(U1)->площадка. via.direction в
#   этом случае игнорируется (у симметричной пары нет одного "направления").
#   direction применяется только при count: 1.
# - Секции rules/boundary_zone опциональны: если конфиг нужен только для
#   thermal_via_array (например, разово досыпать термопереходов на плате
#   без конденсаторов), rules можно не указывать вовсе.
# - Для периметрийных корпусов (TQFP, QFP — как 10CL006YE144C8G, TQFP144)
#   используйте placement: outside/boundary — там нет площадок "под
#   корпусом", только выводы по периметру. placement: inside имеет смысл
#   только для BGA/LGA с матрицей шариков/площадок под корпусом.
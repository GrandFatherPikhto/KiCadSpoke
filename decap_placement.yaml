# decap_placement.yaml — конфиг для KiCadDecapPlacer
#
# Расстановка развязывающих конденсаторов вокруг/под BGA-компонентом с
# опциональной stitching-виа на землю рядом с каждым конденсатором.

target_ref: "U1"              # refdes микросхемы (FPGA), вокруг которой расставляем

# Зона-ограничитель (Rule Area), нарисованная вручную в PCB-редакторе —
# используется и как граница "изнутри/снаружи", и как опорная линия для
# режима placement: boundary.
boundary_zone: "RA_DECAP_ZONE"

side: "back"                  # сторона размещения конденсаторов: front | back
rotation_mode: "radial"       # radial (вдоль луча центр->площадка) | fixed
fixed_angle_deg: 0.0

# --- Настройки stitching-виа (глобальные по умолчанию, можно переопределить в assignment) ---
via:
  enabled: true
  net: "GND"                  # на какую цепь сажаем виа
  drill_mm: 0.3
  diameter_mm: 0.6
  offset_from_cap_mm: 0.6     # смещение виа от точки конденсатора
  direction: "away_from_pad"  # away_from_pad | toward_pad | perpendicular
  count: 1                    # 1 | 2 (пара по бокам) — при 2 offset считается для каждой в свою сторону перпендикулярно направлению direction

rules:
  - net: "+3V3_VCCIO"
    assignments:
      # "boundary": ставим прямо на линию зоны — компромисс между близостью
      # к площадке и удобством дальнейшей трассировки снаружи.
      - ref: "C101"
        pad: "A5"
        placement: "boundary"
        offset_mm: 0.0
        via: true

      # "inside": ближе к самой площадке, внутри проекции курьярда —
      # то, что обычно физически прячется под корпусом на обратной
      # стороне платы. offset_mm здесь — насколько НЕ доходим до площадки
      # (отступ от площадки внутрь зоны, а не от границы).
      - ref: "C102"
        pad: "B6"
        placement: "inside"
        offset_mm: 0.5
        via: true

      # "outside": классика — за пределами зоны с отступом наружу.
      - ref: "C103"
        pad: "C7"
        placement: "outside"
        offset_mm: 1.2
        via: false            # у этого конденсатора виа не нужна (например,
                               # рядом уже есть стежка от соседнего C101)

  - net: "+1V2_VCCINT"
    assignments:
      - ref: "C201"
        pad: "K3"
        placement: "inside"
        offset_mm: 0.4
        via:
          enabled: true        # per-assignment можно переопределить не только
          count: 2              # включение, но и любой параметр из via: выше
          diameter_mm: 0.5

      - ref: "C202"
        pad: "L4"
        placement: "boundary"
        offset_mm: 0.0
        via: true

# Примечания:
# - placement трактуется относительно границы boundary_zone вдоль луча
#   "центр компонента (U1) -> площадка":
#     outside  = точка пересечения луча с границей + offset_mm НАРУЖУ
#     inside   = точка на площадке минус offset_mm В СТОРОНУ ГРАНИЦЫ
#                (т.е. между площадкой и границей, ближе к площадке)
#     boundary = точка пересечения луча с границей, offset_mm — небольшая
#                правка вдоль того же луча (можно оставить 0.0)
# - via: true эквивалентно via: {enabled: true} — берутся остальные
#   параметры из глобального блока via: наверху.
# - via: false отключает виа для конкретного конденсатора независимо от
#   глобальной настройки.
# - via.count: 2 — пара виа симметрична ОТНОСИТЕЛЬНО САМОГО КОНДЕНСАТОРА,
#   разнесена перпендикулярно лучу центр(U1)->площадка. via.direction в
#   этом случае игнорируется (у симметричной пары нет одного "направления").
#   direction применяется только при count: 1.

templates_file: templates/mishin-coil.yaml
schematic_dir: D:/Projects/KiCad/Mishin-Coil/mishin-coil-gen-v1
registry_path: profiles/registries/power_board.registry.json
track_registry_path: profiles/registries/power_board.tracks.registry.json

extract_profiles:
  5v_pi_filter:
    name: 5v_pi_filter
    output: profiles/templates/mishin-coil.yaml
    param:
      PWR_IN: '+5V_DIRTY'
      PWR_OUT: '+5V'
      channel: 1   # <-- добавить параметр для канала
    net_template:
      '{PWR_IN}': '+5V_DIRTY'
      '{PWR_OUT}': '+5V'
    origin_by_component_role: C_IN_BULK
    origin_by_component_pad: '1'

clone_placements:
  conn_pm5v:
    components:
      - role: CONN_PM5V
        offset_along_mm: 0.0
        offset_across_mm: 0.0
        angle_deg: 9.0

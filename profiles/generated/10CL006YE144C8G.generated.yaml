    - role: LIGHT
      offset_along_mm: -1.0
      offset_across_mm: 1.0
      angle_deg: 270.0
      vias:
      - offset_along_mm: -1.0
        offset_across_mm: 2.7
        net: GND
        drill_mm: 0.3
        diameter_mm: 0.6
    - role: HEAVY

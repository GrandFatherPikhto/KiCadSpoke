    anchor_ref: U1
    anchor_pad: '2'
    origin_x_mm: 10.0
    origin_y_mm: 0.0
    rotation_deg: 0.0
    enabled: true
    params:
      PWR_IN: +1V2_DIRTY
      PWR_OUT: +1V2
    nets:
      C_IN_BULK: '{PWR_IN}'
      C_IN_BYPASS: '{PWR_IN}'
      C_OUT_BULK: '{PWR_OUT}'
      C_OUT_BYPASS: '{PWR_OUT}'
      PI_FILTER_FB: '{PWR_OUT}'

  - name: 1v2_pi_filter
    template: pi_filter
    anchor_ref: U2
    anchor_pad: '2'
    origin_x_mm: 10.0
    origin_y_mm: 0.0
    rotation_deg: 0.0
    enabled: true
    params:
      PWR_IN: +1V2_DIRTY
      PWR_OUT: +1V2
    nets:
      C_IN_BULK: '{PWR_IN}'
      C_IN_BYPASS: '{PWR_IN}'
      C_OUT_BULK: '{PWR_OUT}'
      C_OUT_BYPASS: '{PWR_OUT}'
      PI_FILTER_FB: '{PWR_OUT}'


templates_file: power_board_templates.yaml

clone_placements:
  - name: p5v_pi_filter
    template: pm5v_pi_filter
    anchor_ref: J1
    anchor_pad: '1'
    origin_x_mm: 7.0
    origin_y_mm: -5.0
    rotation_deg: 0.0
    enabled: true
    params:
      PWR_IN: +5V_DIRTY
      PWR_OUT: +5V
    nets:
      C_IN_BULK: '{PWR_IN}'
      C_IN_BYPASS: '{PWR_IN}'
      C_OUT_BULK: '{PWR_OUT}'
      C_OUT_BYPASS: '{PWR_OUT}'
      PI_FILTER_FB: '{PWR_OUT}'

  - name: n5v_pi_filter
    template: pm5v_pi_filter
    anchor_ref: J1
    anchor_pad: '3'
    origin_x_mm: 7.0
    origin_y_mm: 2.0
    rotation_deg: 0.0
    enabled: true
    params:
      PWR_IN: -5V_DIRTY
      PWR_OUT: -5V
    nets:
      C_IN_BULK: '{PWR_IN}'
      C_IN_BYPASS: '{PWR_IN}'
      C_OUT_BULK: '{PWR_OUT}'
      C_OUT_BYPASS: '{PWR_OUT}'
      PI_FILTER_FB: '{PWR_OUT}'

  - name: 1v2_pi_filter

layer: B.Cu   # глобальный слой для ManualSpoke (если есть)

templates:
  dac_pi_filter_P3V3:
    layer: B.Cu
    vias:
    - offset_along_mm: -1.8125
      offset_across_mm: 3.1675
      net: +3V3
      drill_mm: 0.4
      diameter_mm: 0.8
    - offset_along_mm: -4.16
      offset_across_mm: 0.0075
      net: GND
      drill_mm: 0.4
      diameter_mm: 0.8
    - offset_along_mm: -3.5375
      offset_across_mm: 3.1675
      net: GND
      drill_mm: 0.4
      diameter_mm: 0.8
    - offset_along_mm: 2.2325
      offset_across_mm: 0.0075
      net: GND
      drill_mm: 0.4
      diameter_mm: 0.8
    - offset_along_mm: -0.0
      offset_across_mm: 0.0
      net: /Channel_0/DAC/+3V3_CLKVDD
      drill_mm: 0.4
      diameter_mm: 0.8
    components:
    - role: DAC_PI_FILTER_C3
      offset_along_mm: 1.37
      offset_across_mm: 1.7275
      angle_deg: 0.0
    - role: DAC_PI_FILTER_C2
      offset_along_mm: -2.38
      offset_across_mm: 0.0075
      angle_deg: 180.0
    - role: DAC_PI_FILTER_FB
      offset_along_mm: -0.0
      offset_across_mm: 0.0
      angle_deg: 0.0
    - role: DAC_PI_FILTER_C1
      offset_along_mm: -2.675
      offset_across_mm: 1.7275
      angle_deg: 180.0

clone_placements:
  # --- Channel_0, питание CLKVDD (пад 11) ---
  - name: dac_filter_ch0_clkvdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC601
    anchor_pad: '11'
    origin_x_mm: 0.0
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true
    # БЕЗ params, nets, refs

  # --- Channel_0, питание DVDD (пад 3) ---
  - name: dac_filter_ch0_dvdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC601
    anchor_pad: '3'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true

  # --- Channel_0, питание AVDD (пад 18) ---
  - name: dac_filter_ch0_avdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC601
    anchor_pad: '18'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true

  # --- Channel_1, питание CLKVDD (пад 11) ---
  - name: dac_filter_ch1_clkvdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC1601
    anchor_pad: '11'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 180.0
    enabled: true

  # --- Channel_1, питание DVDD (пад 3) ---
  - name: dac_filter_ch1_dvdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC1601
    anchor_pad: '3'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true

  # --- Channel_1, питание AVDD (пад 18) ---
  - name: dac_filter_ch1_avdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC1601
    anchor_pad: '18'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true

  # --- Channel_2, питание CLKVDD (пад 11) ---
  - name: dac_filter_ch2_clkvdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC1101
    anchor_pad: '11'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true

  # --- Channel_2, питание DVDD (пад 3) ---
  - name: dac_filter_ch2_dvdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC1101
    anchor_pad: '3'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true

  # --- Channel_2, питание AVDD (пад 18) ---
  - name: dac_filter_ch2_avdd
    template: dac_pi_filter_P3V3
    anchor_ref: IC1101
    anchor_pad: '18'

# Директории для сравнения (сравнивается Папка_1 с Папкой_2)
directories:
  dir1: "."
  dir2: "./files/kicadspoke_v107"

# Глобальные настройки фильтрации
filters:
  # Если список пуст, проверяются все файлы. Иначе — только указанные расширения.
  extensions:
    - ".py"
    - ".yaml"
    - ".kicad_pcb"
  
  # Имена файлов или папок, которые нужно полностью игнорировать
  ignore:
    - ".git"
    - "__pycache__"
    - "logs"
    - ".DS_Store"
    - "files"
    - "old"
    - ".venv"
    - "diagnostics"

# Список конкретных файлов для поштучного сравнения (вне зависимости от папок выше)
# Пути могут быть как абсолютными, так и относительными
custom_file_pairs:
  - file1: "./templates/default.yaml"
    file2: "./backup/default_old.yaml"
